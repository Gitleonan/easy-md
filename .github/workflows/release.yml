name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "md++ ${{ github.ref_name }}"
          releaseBody: |
            ## md++ ${{ github.ref_name }}

            轻量便捷的 Markdown 纯阅读器。

            ### Windows 下载

            - **MSI** — 标准 Windows 安装包

            ### macOS 下载

            - **DMG** — 标准 macOS 磁盘映像

            ### 系统要求

            - Windows 10 1809+（需 WebView2 运行时，Win11 默认自带）
            - macOS 11.0+ (Big Sur)
          releaseDraft: true
          prerelease: false

  release-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "md++ ${{ github.ref_name }}"
          releaseBody: |
            ## md++ ${{ github.ref_name }}

            轻量便捷的 Markdown 纯阅读器。

            ### Windows 下载

            - **MSI** — 标准 Windows 安装包

            ### macOS 下载

            - **DMG** — 标准 macOS 磁盘映像

            ### 系统要求

            - Windows 10 1809+（需 WebView2 运行时，Win11 默认自带）
            - macOS 11.0+ (Big Sur)
          releaseDraft: true
          prerelease: false
